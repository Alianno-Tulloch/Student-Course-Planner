<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Course Planner - Home</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">
        <header>
            <a href="home.html" class="logo"></a>
            <nav>
                <a class="button" href="login.html">Log In</a>
                <a class="button" href="progress.html">Degree Progress</a>
                <a class="button" href="schedule.html">View Schedule</a>
                <a class="button" href="course_search.html">View Courses</a>
            </nav>
        </header>

        <div class="welcome-section">
            <h2 id="welcome-message">Welcome Guest!</h2>
            <hr>
        </div>

        <div class="upcoming-courses">
            <h3 class="section-title">Your Upcoming Courses:</h3>
            <div class="course-flow">
                <div class="course-card-orange">
                    <strong>CPXXX</strong>
                    <p>MWF X:00 - X:00</p>
                </div>
                <div class="arrow">&#8594;</div>
                <div class="course-card-orange">
                    <strong>CPXXX</strong>
                    <p>MWF X:00 - X:00</p>
                </div>
                <div class="arrow">&#8594;</div>
                <div class="course-card-orange">
                    <strong>CPXXX</strong>
                    <p>MWF X:00 - X:00</p>
                </div>
            </div>
        </div>

        <div class="degree-progress">
            <h3 class="section-title">XXX Degree Progress</h3>
            <div class="progress-bar-container">
                <div class="progress-bar-fill"></div>
            </div>
        </div>

        <div class="recommended-courses">
            <h3 class="section-title">Recommended Courses</h3>
            <div class="recommended-grid">
                <div class="course-card-dark">CPXXX</div>
                <div class="course-card-dark">CPXXX</div>
                <div class="course-card-dark">CPXXX</div>
                <div class="course-card-dark">CPXXX</div>
            </div>
        </div>
    </div>
</body>

</html>
