<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Course Planner - Home</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">
        <header>
            <a href="home.html" class="logo"></a>
            <nav>
                <a class="button" href="progress.html">Degree Progress</a>
                <a class="button" href="schedule.html">View Schedule</a>
                <a class="button" href="course_search.html">View Courses</a>
                <button onclick="localStorage.removeItem('loggedInUser'); window.location.href='login.html'" style="background:#e17a47; margin-left: 10px;">Logout</button>
            </nav>
        </header>

        <div class="welcome-section">
            <h2 id="welcome-message">Welcome Guest!</h2>
            <hr>
        </div>

        <div class="upcoming-courses">
            <h3 class="section-title">Your Upcoming Courses:</h3>
            <div class="course-flow" id="upcoming-courses-flow">
                <div class="course-card-orange">
                    <strong>Loading...</strong>
                    <p>Fetching your schedule</p>
                </div>
            </div>
        </div>

        <div class="degree-progress">
            <h3 class="section-title">Degree Progress <span id="progress-text" style="font-weight:normal; font-size: 0.8em; margin-left:10px;"></span></h3>
            <div class="progress-bar-container" style="background:#edf2f7; width:100%; border-radius:20px; height:24px; overflow:hidden;">
                <div class="progress-bar-fill" id="progress-bar-fill" style="width: 0%; height:100%; background-color:#20c997; transition: width 0.5s ease-in-out;"></div>
            </div>
            <p style="font-size: 0.75rem; color: #a0aec0; margin-top: 5px;">* Progress is divided by a standard graduation requirement of 30.0 credits for this prototype.</p>
        </div>

        <div class="recommended-courses">
            <h3 class="section-title">Recommended Courses</h3>
            <div class="recommended-grid">
                <div class="course-card-dark">CPXXX</div>
                <div class="course-card-dark">CPXXX</div>
                <div class="course-card-dark">CPXXX</div>
                <div class="course-card-dark">CPXXX</div>
            </div>
        </div>
    </div>
    <script src="api.js"></script>
</body>

</html>
