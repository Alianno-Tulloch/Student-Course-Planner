<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Search</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <a href="home.html" class="logo"></a>
            <nav>
                <a href="progress.html" class="button">Degree Progress</a>
                <a href="schedule.html" class="button">View Schedule</a>
                <a href="course_search.html" class="button">View Courses</a>
                <button onclick="localStorage.removeItem('loggedInUser'); window.location.href='login.html'" style="background:#e17a47; margin-left: 10px;">Logout</button>
            </nav>
        </header>

        <h1 class="page-title" style="margin-bottom: 20px; color: #2d3748;">Course Search</h1>
        <input type="text" class="search-bar" id="search-input" placeholder="Search">

        <div class="filters">
            <select id="term-select">
                <option value="1" selected>Term 1 (Fall 2026)</option>
                <option value="2">Term 2 (Spring 2027)</option>
            </select>
            <select id="level-select">
                <option value="all">All Levels</option>
                <option value="undergrad">Undergraduate</option>
                <option value="graduate">Graduate</option>
            </select>
            <select id="department-select">
                <option value="all">All Departments</option>
            </select>
        </div>

        <div class="results-grid" id="results-grid">
            <!-- Courses will be dynamically injected here using JavaScript -->
            <p style="grid-column: span 3; text-align: center; color: #a0aec0; width: 100%;">Enter a search term above, or press enter to load all courses.</p>
        </div>
    </div>
    <script src="api.js"></script>
</body>

</html>
