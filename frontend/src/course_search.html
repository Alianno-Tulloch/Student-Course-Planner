<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Search</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <a href="home.html" class="logo"></a>
            <nav>
                <a href="progress.html" class="button">Degree Progress</a>
                <a href="schedule.html" class="button">View Schedule</a>
                <a href="course_search.html" class="button">View Courses</a>
            </nav>
        </header>

        <div class="image-placeholder">IMG</div>
        <input type="text" class="search-bar" placeholder="Search">

        <div class="filters">
            <select>
                <option>Term (Winter/Fall)</option>
            </select>
            <select>
                <option>Level</option>
            </select>
            <select>
                <option>Available</option>
            </select>
            <select>
                <option>Open</option>
            </select>
            <select>
                <option>Department</option>
            </select>
        </div>

        <div class="results-grid">
            <div class="course-card">
                <input type="text" placeholder="CP101" disabled>
                <button onclick="addCourse('CP101')">Add</button>
                <p>Time, Instructor, etc</p>
            </div>
            <div class="course-card">
                <input type="text" placeholder="CP102" disabled>
                <button onclick="addCourse('CP102')">Add</button>
                <p>Time, Instructor, etc</p>
            </div>
        </div>
    </div>
    <script src="api.js"></script>
</body>

</html>
