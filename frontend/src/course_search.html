<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Search</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <a href="home.html" class="logo"></a>
            <nav>
                <a href="progress.html" class="button">Degree Progress</a>
                <a href="schedule.html" class="button">View Schedule</a>
                <a href="course_search.html" class="button">View Courses</a>
            </nav>
        </header>

        <div class="image-placeholder">IMG</div>
        <input type="text" class="search-bar" id="search-input" placeholder="Search">

        <div class="filters">
            <select id="term-select">
                <option value="1" selected>Term 1 (Fall 2026)</option>
                <option value="2">Term 2 (Spring 2027)</option>
            </select>
            <select>
                <option>Level</option>
            </select>
            <select>
                <option>Available</option>
            </select>
            <select>
                <option>Open</option>
            </select>
            <select>
                <option>Department</option>
            </select>
        </div>

        <div class="results-grid" id="results-grid">
            <!-- Courses will be dynamically injected here using JavaScript -->
            <p style="grid-column: span 3; text-align: center; color: #a0aec0; width: 100%;">Enter a search term above, or press enter to load all courses.</p>
        </div>
    </div>
    <script src="api.js"></script>
</body>

</html>
