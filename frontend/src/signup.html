<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Course Planner - Sign Up</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .login-input {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        .login-btn {
            background-color: #20c997;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .login-btn:hover {
            background-color: #17a589;
        }
        
        #signup-error {
            color: #d63031;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container login-container">
        <div class="logo" style="margin: 0 auto 20px;"></div>
        <h2 style="color: #6c5ce7;">Join the Program</h2>
        <p style="color: #666; margin-top: 5px;">Create your student account</p>

        <form class="login-form" id="signup-form">
            <input type="text" id="signup-name" class="login-input" placeholder="Full Name" required>
            <input type="text" id="signup-username" class="login-input" placeholder="Desired Username" required>
            <input type="password" id="signup-password" class="login-input" placeholder="Password" required>
            
            <select id="signup-role" class="login-input" required onchange="toggleStudentFields()">
                <option value="student">Student Account</option>
                <option value="teacher">Teacher Account</option>
            </select>

            <div id="student-extras">
                <div style="display:flex; flex-direction:column; gap:10px; margin-top:5px;">
                    <select id="signup-major" class="login-input">
                        <option value="">Select Primary Major</option>
                    </select>
                    <select id="signup-minor" class="login-input">
                        <option value="">Select Academic Minor (Optional)</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="login-btn">Create Account</button>
        </form>
        <p id="signup-error"></p>
        
        <p style="margin-top: 20px; font-size: 0.9rem;">
            Already have an account? <a href="login.html" style="color: #6c5ce7; font-weight: bold; text-decoration: none;">Log In</a>
        </p>
    </div>

    <script src="api.js"></script>
</body>

</html>
