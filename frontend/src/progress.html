<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Degree Progress</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <a href="home.html" class="logo"></a>
            <nav>
                <a href="progress.html" class="button active">Degree Progress</a>
                <a href="schedule.html" class="button">View Schedule</a>
                <a href="course_search.html" class="button">View Courses</a>
                <button onclick="localStorage.removeItem('loggedInUser'); window.location.href='login.html'" style="background:#e17a47; margin-left: 10px;">Logout</button>
            </nav>
        </header>

        <h1 class="page-title" id="page-title-text">Degree Progress</h1>

        <div class="legend">
            <div><span>Completed</span></div>
            <div><span>In Progress</span></div>
            <div><span>Planned</span></div>
        </div>

        <div class="progress-section">
            <div class="progress-label">Core courses <span id="progress-text" style="font-weight:normal; font-size: 0.8em; margin-left:10px;"></span></div>
            <div class="progress-bar">
                <div class="progress-fill fill-core" id="progress-bar-fill" style="width: 0%; transition: width 0.5s ease-in-out;"></div>
            </div>
            <p style="font-size: 0.75rem; color: #a0aec0; margin-top: 5px;">* Progress is divided by a standard graduation requirement of 30.0 credits for this prototype.</p>
        </div>

        <div class="progress-section">
            <div class="progress-label">Electives <span id="elective-text" style="font-weight:normal; font-size: 0.8em; margin-left:10px;"></span></div>
            <div class="progress-bar">
                <div class="progress-fill fill-electives" style="width: 0%; transition: width 0.5s ease-in-out;"></div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div>
                <div class="box-title">Overview</div>
                <div class="overview-box" id="progress-overview">
                    Loading student metrics...
                </div>
            </div>
            <div>
                <div class="box-title">Course History</div>
                <div class="course-history" id="progress-history">
                    <div style="color: #a0aec0; width: 100%; border: none; background: none;">Loading course history...</div>
                </div>
            </div>
        </div>

    </div>
    <script src="api.js"></script>
</body>

</html>
