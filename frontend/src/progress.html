<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Degree Progress</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <a href="home.html" class="logo"></a>
            <nav>
                <a href="progress.html" class="button active">Degree Progress</a>
                <a href="schedule.html" class="button">View Schedule</a>
                <a href="course_search.html" class="button">View Courses</a>
            </nav>
        </header>

        <h1 class="page-title">XXX Degree Progress</h1>

        <div class="legend">
            <div><span>Completed</span></div>
            <div><span>In Progress</span></div>
            <div><span>Planned</span></div>
        </div>

        <div class="progress-section">
            <div class="progress-label">Core courses</div>
            <div class="progress-bar">
                <div class="progress-fill fill-core"></div>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-label">Electives</div>
            <div class="progress-bar">
                <div class="progress-fill fill-electives"></div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div>
                <div class="box-title">Overview (GPA, Minor, What if, etc)</div>
                <div class="overview-box"></div>
            </div>
            <div>
                <div class="box-title">Course History</div>
                <div class="course-history">
                    <div>CPXXX</div>
                    <div>CPXXX</div>
                    <div>CPXXX</div>
                    <div>CPXXX</div>
                    <div>CPXXX</div>
                    <div>CPXXX</div>
                    <div class="planned">CPXXX</div>
                    <div class="planned">CPXXX</div>
                </div>
            </div>
        </div>

        <div>
            <div class="box-title">Conflicts</div>
            <div class="conflicts-box"></div>
        </div>
    </div>
</body>

</html>
