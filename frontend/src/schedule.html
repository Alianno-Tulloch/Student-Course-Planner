<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <a href="home.html" class="logo"></a>
            <nav>
                <a href="progress.html" class="button">Degree Progress</a>
                <a href="schedule.html" class="button active">View Schedule</a>
                <a href="course_search.html" class="button">View Courses</a>
                <button onclick="localStorage.removeItem('loggedInUser'); window.location.href='login.html'" style="background:#e17a47; margin-left: 10px;">Logout</button>
            </nav>
        </header>

        <div class="schedule-header">
            <h2 id="schedule-user-info">Loading Student Info...</h2>
        </div>

        <div class="controls">
            <div class="credits">
                Credits: <span id="schedule-credits" style="font-weight: 800; color: #2d3748; margin-left: 5px;">0</span>
            </div>
            <div class="term-select">
                Schedule
                <select id="schedule-term-select" style="margin-left: 10px; padding: 5px; border-radius: 4px; border: 1px solid #cbd5e0;">
                    <!-- Auto populated via javascript bounds -->
                </select>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Mon</th>
                    <th>Tues</th>
                    <th>Wed</th>
                    <th>Thurs</th>
                    <th>Fri</th>
                </tr>
            </thead>
            <tbody id="schedule-table-body">
                <tr>
                    <td id="schedule-Mon" style="vertical-align: top; padding: 10px;"></td>
                    <td id="schedule-Tues" style="vertical-align: top; padding: 10px;"></td>
                    <td id="schedule-Wed" style="vertical-align: top; padding: 10px;"></td>
                    <td id="schedule-Thurs" style="vertical-align: top; padding: 10px;"></td>
                    <td id="schedule-Fri" style="vertical-align: top; padding: 10px;"></td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="api.js"></script>
</body>

</html>
