services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    env_file:
      - .env
    networks:
      - app-network

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend/src:/usr/share/nginx/html
      - ./images:/usr/share/nginx/images
    ports:
      - "8080:80"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
